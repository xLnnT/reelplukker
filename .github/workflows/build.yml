name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install python deps
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 'pyinstaller>=6.10'
          pip install --force-reinstall --no-binary charset-normalizer charset-normalizer

      - name: Download ffmpeg/ffprobe (universal)
        run: |
          mkdir -p bin
          curl -L https://evermeet.cx/ffmpeg/getrelease/zip -o ffmpeg.zip
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip -o ffprobe.zip
          unzip -o ffmpeg.zip -d bin/
          unzip -o ffprobe.zip -d bin/
          chmod +x bin/ffmpeg bin/ffprobe

      - name: Build app
        run: pyinstaller --noconfirm ReelPlukker.spec

      - name: Zip .app
        run: |
          cd dist
          zip -ry ReelPlukker-macos-arm64.zip ReelPlukker.app

      - uses: actions/upload-artifact@v4
        with:
          name: ReelPlukker-macos-arm64
          path: dist/ReelPlukker-macos-arm64.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 'pyinstaller>=6.10'
        shell: bash

      - name: Download ffmpeg/ffprobe
        shell: bash
        run: |
          mkdir -p bin
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          unzip -q ffmpeg.zip -d ffmpeg-temp
          cp ffmpeg-temp/*/bin/ffmpeg.exe bin/
          cp ffmpeg-temp/*/bin/ffprobe.exe bin/

      - name: Build exe
        run: pyinstaller --noconfirm ReelPlukker.spec

      - name: Zip dist folder
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path ReelPlukker -DestinationPath ReelPlukker-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ReelPlukker-windows-x64
          path: dist/ReelPlukker-windows-x64.zip

  release:
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
